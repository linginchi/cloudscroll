<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>閱讀 — 雲箋文舍</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/reader.css">
  <link rel="stylesheet" href="css/book.css">
</head>
<body>
  <div class="page" id="reader-page">
    <div class="page-inner reader-page-inner">
      <!-- 頂欄 -->
      <div class="reader-topbar">
        <a class="reader-back" id="reader-back" href="toc.html">← 目錄</a>
        <span class="reader-title" id="article-title">文章標題</span>
        <div class="reader-lang" id="lang-toggle">
          <span class="lang-option active" data-lang="zh">中</span>
          <span class="lang-sep">|</span>
          <span class="lang-option" data-lang="en">EN</span>
        </div>
      </div>

      <!-- 滾動閱讀區 -->
      <div class="reader-scroll" id="reader-scroll">
        <div class="reader-inner" id="reader-inner"></div>
      </div>

      <!-- 底部 -->
      <div class="reader-bottom">
        <div class="reader-progress" id="reader-progress">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="reader-meta">
          <span class="book-name">雲箋文舍</span>
          <span class="page-num" id="page-num">—</span>
        </div>
      </div>
    </div>
  </div>
  <script src="js/reader.js"></script>
</body>
</html>
